<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>去AI味工具 | 云端版</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui; background: #f0f2f5; padding: 24px; }
        .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 28px; padding: 24px; }
        .tool-grid { display: flex; gap: 24px; flex-wrap: wrap; }
        .input-area, .output-area { flex: 1; min-width: 260px; }
        .button-area { flex: 0 0 120px; display: flex; flex-direction: column; justify-content: center; gap: 18px; }
        textarea { width: 100%; height: 480px; padding: 18px; font-family: monospace; border: 1px solid #ccc; border-radius: 16px; }
        .btn { background: white; border: 1px solid #3b82f6; padding: 10px; border-radius: 60px; cursor: pointer; }
        .btn-primary { background: #3b82f6; color: white; }
        .info-note { margin-top: 24px; background: #f8fafc; padding: 14px; border-radius: 20px; font-size: 0.85rem; }
    </style>
</head>
<body>
<div class="container">
    <h1>✍️ 去AI味工具 · 云端版</h1>
    <div class="tool-grid">
        <div class="input-area">
            <textarea id="inputText" placeholder="请输入文本，每行将独立比较重复..."></textarea>
            <div style="margin-top: 12px; display: flex; gap: 12px;">
                <button id="exampleBtn" class="btn">示例文本</button>
                <button id="clearBtn" class="btn">清空左侧</button>
            </div>
        </div>
        <div class="button-area">
            <button id="dedupBtn" class="btn btn-primary">✨ 开始去重</button>
            <button id="copyBtn" class="btn">📋 复制结果</button>
        </div>
        <div class="output-area">
            <textarea id="outputText" readonly placeholder="去重结果将显示在这里..."></textarea>
        </div>
    </div>
    <div class="info-note">
        💾 您的文本和去重结果已安全保存在 Vercel Blob 云存储中
    </div>
</div>
<script>
    const inputArea = document.getElementById('inputText');
    const outputArea = document.getElementById('outputText');
    const dedupBtn = document.getElementById('dedupBtn');
    const copyBtn = document.getElementById('copyBtn');
    const exampleBtn = document.getElementById('exampleBtn');
    const clearBtn = document.getElementById('clearBtn');

    async function processDeduplication() {
        const rawText = inputArea.value;
        if (!rawText.trim()) {
            outputArea.value = '⚠️ 请在左侧输入文本';
            return;
        }
        dedupBtn.disabled = true;
        dedupBtn.innerText = '分析中...';
        try {
            const res = await fetch('/process', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: rawText })
            });
            const data = await res.json();
            if (res.ok) {
                outputArea.value = data.result;
            } else {
                outputArea.value = '❌ 错误: ' + data.error;
            }
        } catch (err) {
            outputArea.value = '❌ 网络错误: ' + err.message;
        } finally {
            dedupBtn.disabled = false;
            dedupBtn.innerText = '✨ 开始去重';
        }
    }
    function setExample() {
        inputArea.value = "Hello\nHello\nWorld\nWorld\nPython";
        outputArea.value = "";
    }
    function clearLeft() { inputArea.value = ""; outputArea.value = ""; }
    function copyResult() {
        if (outputArea.value) navigator.clipboard.writeText(outputArea.value);
        else alert("无结果可复制");
    }
    dedupBtn.addEventListener('click', processDeduplication);
    copyBtn.addEventListener('click', copyResult);
    exampleBtn.addEventListener('click', setExample);
    clearBtn.addEventListener('click', clearLeft);
    setExample();
</script>
</body>
</html>
